<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PYP – Local Distance Puzzle</title>

<style>
body {
  margin: 0;
  background: #f5f0d8;
  font-family: system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

#container {
  text-align: center;
}

#game {
  display: grid;
  grid-template-columns: repeat(5, 64px);
  grid-template-rows: repeat(5, 64px);
  gap: 6px;
  margin-bottom: 12px;
}

.cell {
  background: #fffdf4;
  border-radius: 12px;
  font-size: 28px;
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
  cursor: pointer;
}

.cell.anchor {
  background: transparent;
  cursor: default;
}

.cell.invalid {
  outline: 3px solid rgba(200, 0, 0, 0.55);
}

button {
  padding: 6px 14px;
  font-size: 14px;
}

#status {
  margin-top: 8px;
  font-size: 13px;
  color: #444;
}
</style>
</head>

<body>
<div id="container">
  <div id="game"></div>
  <button onclick="resetPuzzle()">Reset / New Puzzle</button>
  <div id="status">Click cells to cycle shapes.</div>
</div>

<script>
const SIZE = 5;
const SHAPES = ['', 'X', 'I', 'O'];   // cycle order
let grid = [];
let anchors = {};
let distances = {};

const game = document.getElementById('game');
const status = document.getElementById('status');

const idx = (x,y) => y * SIZE + x;
const rand = () => Math.floor(Math.random() * SIZE);
const manhattan = (a,b) => Math.abs(a.x-b.x) + Math.abs(a.y-b.y);

function resetPuzzle() {
  grid = Array(SIZE * SIZE).fill('');
  anchors = {};
  distances = {};
  game.innerHTML = '';

  // place two anchors per shape
  ['X','I','O'].forEach(shape => {
    let a, b, d;
    do {
      a = {x: rand(), y: rand()};
      b = {x: rand(), y: rand()};
      d = manhattan(a, b);
    } while (
      d === 0 ||
      anchors[`${a.x},${a.y}`] ||
      anchors[`${b.x},${b.y}`]
    );

    anchors[`${a.x},${a.y}`] = shape;
    anchors[`${b.x},${b.y}`] = shape;
    distances[shape] = d;
  });

  // build grid
  for (let y=0; y<SIZE; y++) {
    for (let x=0; x<SIZE; x++) {
      const el = document.createElement('div');
      el.className = 'cell';
      const key = `${x},${y}`;

      if (anchors[key]) {
        const s = anchors[key];
        grid[idx(x,y)] = s;
        el.textContent = s;
        el.classList.add('anchor');
      } else {
        el.onclick = () => {
          const i = idx(x,y);
          const cur = SHAPES.indexOf(grid[i]);
          const next = SHAPES[(cur+1) % SHAPES.length];
          grid[i] = next;
          el.textContent = next;
          validate();
        };
      }

      game.appendChild(el);
    }
  }

  validate();
}

function validate() {
  [...game.children].forEach(c => c.classList.remove('invalid'));
  let solved = true;

  ['X','I','O'].forEach(shape => {
    const pts = [];
    for (let y=0;y<SIZE;y++) for (let x=0;x<SIZE;x++)
      if (grid[idx(x,y)] === shape)
        pts.push({x,y});

    if (pts.length === 1) {
      mark(pts[0]);
      solved = false;
      return;
    }

    pts.forEach(p => {
      let ok = pts.some(q =>
        q !== p && manhattan(p,q) === distances[shape]
      );
      if (!ok) {
        mark(p);
        solved = false;
      }
    });
  });

  if (solved && grid.every(c => c !== '')) {
    status.textContent = 'Solved ✨';
  } else {
    status.textContent = 'Each shape must link to at least one match.';
  }
}

function mark(p) {
  const i = idx(p.x,p.y);
  game.children[i].classList.add('invalid');
}

resetPuzzle();
</script>
</body>
</html>
