<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PYP – 5x5 Test Puzzle</title>

<style>
  body {
    margin: 0;
    background: #f5f0d8;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #game {
    display: grid;
    grid-template-columns: repeat(5, 64px);
    grid-template-rows: repeat(5, 64px);
    gap: 6px;
  }

  .cell {
    background: #fffdf4;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    user-select: none;
    cursor: pointer;
  }

  .cell.anchor {
    background: transparent;
    cursor: default;
  }

  .cell.cancelled {
    background:
      repeating-linear-gradient(
        45deg,
        rgba(0,0,0,0.06),
        rgba(0,0,0,0.06) 1px,
        transparent 1px,
        transparent 4px
      ),
      #fffdf4;
  }

  .cell.diag {
    box-shadow: inset 0 0 0 2px rgba(80,80,80,0.4);
  }

  #palette {
    margin-top: 14px;
    display: flex;
    gap: 12px;
  }

  .symbol {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
  }

  .symbol.selected {
    outline: 3px solid #333;
  }

  #status {
    margin-top: 10px;
    font-size: 13px;
    color: #444;
  }
</style>
</head>

<body>
<div id="container">
  <div id="game"></div>
  <div id="palette"></div>
  <div id="status">Try a move. See what changes.</div>
</div>

<script>
  const SIZE = 5;
  const SYMBOLS = ['●', '━', '│', '○'];
  let selected = null;

  // Pre-set puzzle (very light!)
  const anchors = {
    '1,0': '━',
    '3,2': '✕',
    '0,4': '│'
  };

  const grid = Array(SIZE * SIZE).fill(null);
  const cells = [];
  const game = document.getElementById('game');
  const palette = document.getElementById('palette');
  const status = document.getElementById('status');

  SYMBOLS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'symbol';
    el.textContent = s;
    el.onclick = () => {
      document.querySelectorAll('.symbol').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      selected = s;
    };
    palette.appendChild(el);
  });

  const idx = (x,y) => y * SIZE + x;

  function diagNeighbors(x,y) {
    return [
      [x+1,y+1],[x+1,y-1],[x-1,y+1],[x-1,y-1]
    ].filter(([cx,cy]) => cx>=0 && cy>=0 && cx<SIZE && cy<SIZE);
  }

  function isCancelled(x,y) {
    return diagNeighbors(x,y).some(
      ([cx,cy]) => grid[idx(cx,cy)] === '✕'
    );
  }

  function redraw() {
    cells.forEach(({x,y,el}) => {
      el.classList.remove('cancelled','diag');
      if (isCancelled(x,y)) el.classList.add('cancelled');
    });
  }

  function previewX(x,y) {
    diagNeighbors(x,y).forEach(([cx,cy]) => {
      const c = cells.find(c => c.x===cx && c.y===cy);
      if (c) c.el.classList.add('diag');
    });
  }

  for (let y=0; y<SIZE; y++) {
    for (let x=0; x<SIZE; x++) {
      const el = document.createElement('div');
      el.className = 'cell';
      const key = `${x},${y}`;

      if (anchors[key]) {
        const t = anchors[key];
        grid[idx(x,y)] = t;
        el.textContent = t;
        el.classList.add('anchor');
        if (t === '✕') {
          el.onmouseenter = () => previewX(x,y);
          el.onmouseleave = redraw;
        }
      } else {
        el.onclick = () => {
          if (!selected) return;
          grid[idx(x,y)] = selected;
          el.textContent = selected;
          redraw();
          status.textContent = 'Notice how certain cells stop counting.';
        };
      }

      game.appendChild(el);
      cells.push({x,y,el});
    }
  }

  redraw();
</script>
</body>
</html>
