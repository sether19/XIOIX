<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PYP – Distance Puzzle Test</title>

<style>
  body {
    margin: 0;
    background: #f5f0d8;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #game {
    display: grid;
    grid-template-columns: repeat(5, 64px);
    grid-template-rows: repeat(5, 64px);
    gap: 6px;
    margin-bottom: 14px;
  }

  .cell {
    background: #fffdf4;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    user-select: none;
    cursor: pointer;
  }

  .cell.anchor {
    background: transparent;
    cursor: default;
  }

  #palette {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  .symbol {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
  }

  .symbol.selected {
    outline: 3px solid #333;
  }

  button {
    padding: 6px 14px;
    font-size: 14px;
  }

  #status {
    margin-top: 8px;
    font-size: 13px;
    color: #444;
  }
</style>
</head>

<body>
<div id="container">
  <div id="game"></div>

  <div id="palette"></div>

  <button onclick="resetPuzzle()">Reset / New Puzzle</button>

  <div id="status">Each shape must keep the same distance to itself.</div>
</div>

<script>
const SIZE = 5;
const SHAPES = ['✕', '◆', '○'];
let selectedShape = null;

let grid = [];
let cells = [];
let anchors = {};
let distanceRules = {};

const game = document.getElementById('game');
const palette = document.getElementById('palette');
const status = document.getElementById('status');

const idx = (x,y) => y*SIZE + x;
const manhattan = (a,b) => Math.abs(a.x-b.x)+Math.abs(a.y-b.y);

SHAPES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'symbol';
  el.textContent = s;
  el.onclick = () => {
    document.querySelectorAll('.symbol').forEach(x=>x.classList.remove('selected'));
    el.classList.add('selected');
    selectedShape = s;
  };
  palette.appendChild(el);
});

function resetPuzzle() {
  game.innerHTML = '';
  grid = Array(SIZE*SIZE).fill(null);
  cells = [];
  anchors = {};
  distanceRules = {};

  // Place two anchors per shape randomly
  SHAPES.forEach(shape => {
    let placed = [];
    while (placed.length < 2) {
      const x = Math.floor(Math.random()*SIZE);
      const y = Math.floor(Math.random()*SIZE);
      const key = `${x},${y}`;
      if (!anchors[key]) {
        anchors[key] = shape;
        placed.push({x,y});
      }
    }
    distanceRules[shape] = manhattan(placed[0], placed[1]);
  });

  for (let y=0;y<SIZE;y++) {
    for (let x=0;x<SIZE;x++) {
      const el = document.createElement('div');
      el.className = 'cell';
      const key = `${x},${y}`;

      if (anchors[key]) {
        const s = anchors[key];
        grid[idx(x,y)] = s;
        el.textContent = s;
        el.classList.add('anchor');
      } else {
        el.onclick = () => {
          if (!selectedShape) return;
          if (!canPlace(selectedShape, x, y)) return;
          grid[idx(x,y)] = selectedShape;
          el.textContent = selectedShape;
          checkWin();
        };
      }

      game.appendChild(el);
      cells.push({x,y,el});
    }
  }

  status.textContent = 'Each shape keeps a fixed distance to itself.';
}

function canPlace(shape, x, y) {
  const rule = distanceRules[shape];
  for (const {x:cx,y:cy} of cells) {
    if (grid[idx(cx,cy)] === shape) {
      if (manhattan({x,y},{x:cx,y:cy}) !== rule) return false;
    }
  }
  return true;
}

function checkWin() {
  if (grid.every(c => c !== null)) {
    status.textContent = 'Solved ✨';
  }
}

resetPuzzle();
</script>
</body>
</html>
