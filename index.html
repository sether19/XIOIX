<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Constraint Weaving – v8</title>

<style>
  body {
    margin: 0;
    background: #f5f0d8;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #game {
    display: grid;
    grid-template-columns: repeat(6, minmax(48px, 64px));
    grid-template-rows: repeat(6, minmax(48px, 64px));
    gap: 6px;
  }

  .cell {
    background: #fffdf4;
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    user-select: none;
  }

  .cell:hover {
    background: #f0ecd0;
  }

  .cell.settle {
    background: #e6f0e6;
  }

  .cell.unstable {
    background: #f5dada;
  }

  /* Anchors are visually blank but immovable */
  .cell.anchor {
    background: transparent;
    cursor: default;
  }

  .cell.diagPreview {
    box-shadow: inset 0 0 0 2px rgba(80, 80, 80, 0.45);
  }

  #palette {
    margin-top: 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .thread {
    width: 44px;
    height: 44px;
    font-size: 24px;
    border-radius: 50%;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thread.selected {
    outline: 3px solid #333;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    color: #444;
    text-align: center;
  }
</style>
</head>

<body>
<div id="container">
  <div id="game"></div>
  <div id="palette"></div>
  <div id="status">
    Each row &amp; column wants one of each thread.
  </div>
</div>

<script>
  const SIZE = 6;
  const THREADS = ['●', '━', '│', '✕', '○'];
  let selectedThread = null;

  // Pre-placed, immovable anchors
  const anchors = {
    '1,0': '━',
    '4,1': '○',
    '0,3': '│',
    '2,4': '✕'
  };

  const grid = Array(SIZE * SIZE).fill(null);
  const cells = [];

  const game = document.getElementById('game');
  const palette = document.getElementById('palette');
  const status = document.getElementById('status');

  // Build palette
  THREADS.forEach(symbol => {
    const el = document.createElement('div');
    el.className = 'thread';
    el.textContent = symbol;
    el.onclick = () => {
      document.querySelectorAll('.thread')
        .forEach(t => t.classList.remove('selected'));
      el.classList.add('selected');
      selectedThread = symbol;
    };
    palette.appendChild(el);
  });

  const idx = (x, y) => y * SIZE + x;

  // X cancels only the four immediate diagonal neighbors
  const diagonalNeighbors = (x, y) => [
    [x + 1, y + 1],
    [x + 1, y - 1],
    [x - 1, y + 1],
    [x - 1, y - 1]
  ].filter(([cx, cy]) =>
    cx >= 0 && cy >= 0 && cx < SIZE && cy < SIZE
  );

  const isCancelled = (x, y) =>
    diagonalNeighbors(x, y).some(
      ([cx, cy]) => grid[idx(cx, cy)] === '✕'
    );

  function hasConflict(x, y, t) {
    if (t === '○' || isCancelled(x, y)) return false;

    if (t === '━') {
      for (let i = 0; i < SIZE; i++) {
        if (i !== x &&
            grid[idx(i, y)] === '━' &&
            !isCancelled(i, y)) return true;
      }
    }

    if (t === '│') {
      for (let i = 0; i < SIZE; i++) {
        if (i !== y &&
            grid[idx(x, i)] === '│' &&
            !isCancelled(x, i)) return true;
      }
    }

    return false;
  }

  function updateBoard() {
    let calm = true;

    cells.forEach(({ x, y, el }) => {
      el.classList.remove('diagPreview', 'settle', 'unstable');
      const t = grid[idx(x, y)];
      if (!t) {
        calm = false;
        return;
      }
      if (hasConflict(x, y, t)) {
        el.classList.add('unstable');
        calm = false;
      } else {
        el.classList.add('settle');
      }
    });

    status.textContent = calm
      ? 'The system feels calm.'
      : 'Each row & column wants one of each thread.';
  }

  function previewX(x, y) {
    diagonalNeighbors(x, y).forEach(([cx, cy]) => {
      const cell = cells.find(c => c.x === cx && c.y === cy);
      if (cell) cell.el.classList.add('diagPreview');
    });
  }

  // Build grid
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const el = document.createElement('div');
      el.className = 'cell';
      const key = `${x},${y}`;

      if (anchors[key]) {
        const t = anchors[key];
        grid[idx(x, y)] = t;
        el.textContent = t;
        el.classList.add('anchor');
        if (t === '✕') {
          el.onclick = () => previewX(x, y);
        }
      } else {
        el.onclick = () => {
          if (!selectedThread) return;
          grid[idx(x, y)] = selectedThread;
          el.textContent = selectedThread;
          if (selectedThread === '✕') {
            el.onclick = () => previewX(x, y);
          }
          updateBoard();
        };
      }

      game.appendChild(el);
      cells.push({ x, y, el });
    }
  }

  updateBoard();
</script>
</body>
</html>
