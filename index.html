<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PYP – Distance Puzzle</title>

<style>
body {
  margin: 0;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.035),
      rgba(0,0,0,0.035) 1px,
      transparent 1px,
      transparent 3px
    ),
    #efe9c9;
  font-family: Chicago, Geneva, system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

#container {
  display: flex;
  gap: 18px;
}

.panel {
  padding: 14px 16px 16px;
  background: #dcd6b8;
  border: 2px solid #000;
  box-shadow: 3px 3px 0 #000;
  text-align: center;
}

#game, #solution {
  display: grid;
  grid-template-columns: repeat(5, 52px);
  grid-template-rows: repeat(5, 52px);
  gap: 6px;
  margin-bottom: 10px;
}

.cell {
  background: #fffdf0;
  border: 2px solid #000;
  box-shadow: inset -2px -2px 0 rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  user-select: none;
}

.cell.anchor {
  background: #f4efcf;
}

.cell.invalid {
  background:
    repeating-linear-gradient(
      45deg,
      rgba(180,20,20,0.18),
      rgba(180,20,20,0.18) 1px,
      transparent 1px,
      transparent 4px
    ),
    #ffeaea;
}

button {
  font-family: inherit;
  font-size: 13px;
  border: 2px solid #000;
  background: #e4e0c8;
  padding: 4px 10px;
  cursor: pointer;
  box-shadow: 2px 2px 0 #000;
}

button:active {
  box-shadow: 0 0 0 #000;
  transform: translate(2px,2px);
}

#status {
  margin-top: 8px;
  font-size: 12px;
}

label {
  font-size: 12px;
}
</style>
</head>

<body>
<div id="container">

  <!-- PLAY PANEL -->
  <div class="panel">
    <div id="game"></div>
    <button onclick="resetPuzzle()">Reset / New Puzzle</button><br><br>
    <label>
      <input type="checkbox" id="debugToggle" onchange="toggleDebug()" />
      Show debug solution
    </label>
    <div id="status">Form distance chains. Adjacent matches are invalid.</div>
  </div>

  <!-- DEBUG PANEL -->
  <div class="panel" id="debugPanel" style="display:none">
    <div id="solution"></div>
    <div style="font-size:12px">Debug Solution</div>
  </div>

</div>

<script>
const SIZE = 5;
const SHAPES = ['', '●', '○', '│', '─', 'X'];
const MAIN = ['●','○','│','─'];

let grid = [];
let solutionGrid = [];
let anchors = {};
let distances = {};

const game = document.getElementById('game');
const solutionEl = document.getElementById('solution');
const status = document.getElementById('status');
const debugPanel = document.getElementById('debugPanel');

const idx = (x,y)=>y*SIZE+x;
const rand = ()=>Math.floor(Math.random()*SIZE);
const manhattan = (a,b)=>Math.abs(a.x-b.x)+Math.abs(a.y-b.y);

function toggleDebug() {
  debugPanel.style.display =
    document.getElementById('debugToggle').checked ? 'block' : 'none';
}

function resetPuzzle() {
  game.innerHTML = '';
  solutionEl.innerHTML = '';
  grid = Array(SIZE*SIZE).fill('');
  solutionGrid = Array(SIZE*SIZE).fill('');
  anchors = {};
  distances = {};

  // Simple, safe anchor generation
  MAIN.forEach(shape=>{
    let a,b,d;
    do {
      a={x:rand(),y:rand()};
      b={x:rand(),y:rand()};
      d=manhattan(a,b);
    } while (
      d < 2 ||
      anchors[`${a.x},${a.y}`] ||
      anchors[`${b.x},${b.y}`]
    );

    anchors[`${a.x},${a.y}`] = shape;
    anchors[`${b.x},${b.y}`] = shape;
    distances[shape] = d;
  });

  // One X
  let xPos;
  do { xPos={x:rand(),y:rand()}; }
  while (anchors[`${xPos.x},${xPos.y}`]);
  anchors[`${xPos.x},${xPos.y}`] = 'X';

  buildBoard(game, grid, true);
  buildBoard(solutionEl, solutionGrid, false);
  validate();
}

function buildBoard(root, arr, playable) {
  for(let y=0;y<SIZE;y++) {
    for(let x=0;x<SIZE;x++) {
      const el=document.createElement('div');
      el.className='cell';
      const key=`${x},${y}`;

      if(anchors[key]) {
        arr[idx(x,y)] = anchors[key];
        el.textContent = anchors[key];
        el.classList.add('anchor');
      } else if(playable) {
        el.onclick = () => {
          const i = idx(x,y);
          const next = SHAPES[(SHAPES.indexOf(arr[i])+1)%SHAPES.length];
          arr[i] = next;
          el.textContent = next;
          validate();
        };
      }

      root.appendChild(el);
    }
  }
}

function validate() {
  [...game.children].forEach(c=>c.classList.remove('invalid'));

  let solved = true;

  MAIN.forEach(shape=>{
    const pts=[];
    for(let y=0;y<SIZE;y++)
      for(let x=0;x<SIZE;x++)
        if(grid[idx(x,y)]===shape) pts.push({x,y});

    if(pts.length < 2) { solved=false; return; }

    pts.forEach(p=>{
      let ok=false;
      for(const q of pts){
        if(p===q) continue;
        const d=manhattan(p,q);
        if(d===1){ ok=false; break; }
        if(d===distances[shape]) ok=true;
      }
      if(!ok){
        solved=false;
        game.children[idx(p.x,p.y)].classList.add('invalid');
      }
    });
  });

  status.textContent =
    solved && grid.every(v=>v!=='')
      ? 'Solved ✨'
      : 'Form distance chains. Adjacent matches are invalid.';
}

resetPuzzle();
</script>
</body>
</html>
